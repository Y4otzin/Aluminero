# .github/workflows/main.yml
name: CI/CD Pipeline for Aluminero

on:
  # Evento que activa el workflow al hacer push a las ramas principales
  push:
    branches:
      - main
      - master
      - develop
  # También se activa al crear o actualizar Pull Requests
  pull_request:
    branches:
      - main
      - master

jobs:
  # ==============================================
  # JOB 1: Pruebas y calidad de código
  # ==============================================
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Python (para el backend)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Instalar dependencias del backend
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      # 4. Ejecutar linter (flake8) en el backend
      - name: Lint with flake8
        run: |
          cd backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # 5. Configurar Node.js (para el frontend)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 6. Instalar dependencias del frontend
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      # 7. Ejecutar pruebas del frontend (si existen)
      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --watchAll=false --passWithNoTests

      # 8. Construir el frontend para verificar que no hay errores
      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # ==============================================
  # JOB 2: Construcción y prueba de Docker
  # ==============================================
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test-and-lint  # Depende del job anterior

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Preparar variables de entorno para la build
      - name: Create .env file
        run: |
          cp .env.example .env
          # Generar una clave secreta temporal para la build
          echo "JWT_SECRET_KEY=github_action_temp_secret" >> .env
          echo "APP_ENV=testing" >> .env

      # Construir las imágenes con docker-compose
      - name: Build Docker images
        run: |
          docker-compose -f docker-compose.yml build

      # Levantar los contenedores en segundo plano
      - name: Start containers
        run: |
          docker-compose -f docker-compose.yml up -d

      # Esperar a que los servicios estén listos
      - name: Wait for services
        run: |
          sleep 10
          docker-compose -f docker-compose.yml ps

      # Verificar que el backend responda (ejemplo)
      - name: Check backend health
        run: |
          curl --fail http://localhost:8000/health || echo "Health endpoint not found"

      # Mostrar logs si algo falla (para depuración)
      - name: Show logs on failure
        if: failure()
        run: docker-compose -f docker-compose.yml logs

  # ==============================================
  # JOB 3: Despliegue (opcional, pero muy útil)
  # ==============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker-build  # Depende del job anterior
    # Solo se ejecuta en la rama principal y si es un push (no en PRs)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    # environment: production  # Puedes configurar un entorno en GitHub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ejemplo de despliegue usando rsync sobre SSH
      - name: Deploy via SSH
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: ${{ secrets.REMOTE_TARGET }}
        # Nota: Este action es un ejemplo. Asegúrate de adaptar el método de despliegue a tu caso.
